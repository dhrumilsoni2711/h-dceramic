<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rameshwar Jewellers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="box">
        <div class="sidebar col-lg-2">
            <h2>Rameshwar Jewellers</h2>

            <ul class="category-list">
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Party Ledger</a></li>
                <li><a href="#">New Sales Order</a></li>
                <li><a href="#">Reparing</a></li>
                <li><a href="#">Sales</a></li>
                <li><a href="#">Stock</a></li>
                <li><a href="#">Report</a></li>
            </ul>
        </div>
        <div class="main-container  col-lg-10">
            <div class="header-section">

                <div class="logo">
                    <img src="image/RJlogo.jpeg" width="8%">
                </div>
                <div class="name">
                    <p>Rameshwar Jewellers</p>
                </div>
            </div>
            <div>
                <div class="Customer_info">
                    <h2>Customer Information</h2>
                    <form>
                        <table>
                            <div class="form-group">
                                <div class="formbox1">
                                    <tr>
                                        <td>
                                            <label for="Customer_name">Customer Name:</label>
                                            <input type="text" id="Customer_name" name="Customer_name" required>
                                        </td>
                                        <td>

                                            <label for="Mob_num">Mobile No:</label>
                                            <input type="tel" id="Mob_num" name="Mob_num" required>
                                        </td>

                                        <td>
                                            <label for="Address">Address:</label>
                                            <input type="text" id="Address" name="Address" required>
                                        </td>
                                    </tr>
                                </div>
                                <div class="formbox1">
                                    <tr>

                                        <td>
                                            <label for="GST No:">GSTIN No:</label>
                                            <input type="text" id="GST_no" name="GST_no" required>
                                        </td>
                                        <td>
                                            <label for="Date">Date:</label>
                                            <input type="date" id="Date" name="Date" required>
                                        </td>
                                        <td>
                                            <label for="Time">Time:</label>
                                            <input type="time" id="Time" name="Time" required>
                                        </td>
                                    </tr>
                                </div>
                            </div>
                </div>
                </table>
                </form>
            </div>
            <div class="Product_info">
                <h2>Product Information</h2>
            </div>
        </div>
    </div>
    </div>


</body>

</html>
